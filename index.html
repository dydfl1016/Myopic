<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPIC Speaking Lab</title>
<style>
body{margin:0;background:#fff7ef;font-family:Arial,sans-serif;color:#231f20}
.app{max-width:760px;margin:auto;padding:18px 15px 95px}
h1{font-size:22px;color:#3d2a20;margin-bottom:6px}
.info{color:#74675f;font-size:14px;line-height:1.5}
.topicTabs{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:12px 0}
.topicTabs button{padding:10px 4px;font-size:13px;border-radius:13px}
.activeTopic{background:#7b4a2f!important;color:white!important}
.card{background:#fffdf9;border:1px solid #ead8c9;border-radius:22px;padding:18px;box-shadow:0 8px 25px #0001}
select,button,textarea{font:inherit}
select{width:100%;padding:13px;border-radius:14px;border:1px solid #ead8c9;margin-bottom:12px}
.korean{font-size:20px;line-height:1.45;font-weight:700;background:#f7eadf;padding:14px;border-radius:16px;margin:14px 0}
.english{font-size:24px;line-height:1.35;font-weight:800;margin:18px 0;padding:16px;border-radius:16px;background:#fff;cursor:pointer;border:1px dashed #d8bfa9}
.hiddenText{color:transparent;text-shadow:0 0 10px #b9a99b;background:#f3e4d6}
.progress{height:10px;background:#eee0d4;border-radius:999px;overflow:hidden}
.bar{height:100%;background:#7b4a2f;width:0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
button{border:0;border-radius:16px;padding:14px;font-weight:800;background:#efe3d8;color:#3c2a21}
.primary{background:#7b4a2f;color:white}
.green{background:#2f6f55;color:white}
.red{background:#a83d32;color:white}
button:disabled{opacity:.45}
textarea{width:100%;min-height:80px;border:1px solid #ead8c9;border-radius:14px;padding:12px}
.bottom{position:fixed;bottom:0;left:0;right:0;background:#fff7eff0;border-top:1px solid #ead8c9;padding:10px}
.bottom div{max-width:760px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}
</style>
</head>

<body>
<div class="app">
<h1>🎤 OPIC Speaking Lab</h1>
<p class="info">주제를 선택하고, 한국어만 보고 영어로 말해보세요. 영어 문장은 터치하면 숨김/보임이 바뀝니다.</p>

<div class="topicTabs" id="topicTabs"></div>

<select id="sectionSelect"></select>

<div class="card">
  <p class="info"><b id="topicTitle"></b></p>
  <p class="info"><span id="sectionName"></span> · <b id="counter"></b></p>
  <div class="progress"><div class="bar" id="bar"></div></div>

  <div class="korean" id="korean"></div>
  <div class="english" id="english" onclick="toggleEnglish()"></div>
  <p class="info">👆 영어 문장을 터치하면 가려지고, 다시 터치하면 보입니다.</p>

  <div class="grid">
    <button class="primary" onclick="speakCurrent()">🔊 듣기</button>
    <button onclick="repeat3()">🔁 3회 듣기</button>
    <button class="green" id="recBtn" onclick="startRecording()">● 녹음 시작</button>
    <button class="red" id="stopBtn" onclick="stopRecording()" disabled>■ 녹음 중지</button>
    <button id="playBtn" onclick="playRecording()" disabled>▶ 내 목소리</button>
    <button onclick="toggleDone()">✓ 완료 체크</button>
  </div>

  <p id="status" class="info"></p>

  <label class="info">음성 속도</label>
  <input id="rate" type="range" min="0.6" max="1.2" step="0.05" value="0.85" style="width:100%">

  <h3>내 발음 메모</h3>
  <textarea id="memo" placeholder="강세, 끊어 읽기, 어려운 발음 메모"></textarea>
</div>

<p class="info">※ GitHub Pages의 https:// 주소에서 열어야 마이크 녹음이 정상 작동합니다.</p>
</div>

<div class="bottom">
  <div>
    <button onclick="prevSentence()">← 이전</button>
    <button class="primary" onclick="nextSentence()">다음 →</button>
  </div>
</div>

let topicIndex=Number(localStorage.getItem("topicIndex")||0);
let idx=Number(localStorage.getItem("multi_idx_"+topicIndex)||0);
let section="All";
let filtered=[];
let englishHidden=false;
let recorder,chunks=[],audioURLs={};
let done=JSON.parse(localStorage.getItem("multi_done")||"{}");

const $=id=>document.getElementById(id);

function init(){
  renderTopicTabs();
  loadTopic();
}

function renderTopicTabs(){
  $("topicTabs").innerHTML=TOPICS.map((t,i)=>
    `<button onclick="changeTopic(${i})" class="${i===topicIndex?'activeTopic':''}">주제 ${i+1}</button>`
  ).join("");
}

function changeTopic(i){
  topicIndex=i;
  localStorage.setItem("topicIndex",topicIndex);
  idx=Number(localStorage.getItem("multi_idx_"+topicIndex)||0);
  section="All";
  englishHidden=false;
  speechSynthesis.cancel();
  loadTopic();
}

function loadTopic(){
  const data=TOPICS[topicIndex].data;
  const sections=["All",...new Set(data.map(x=>x.section))];
  $("sectionSelect").innerHTML=sections.map(s=>`<option>${s}</option>`).join("");
  $("sectionSelect").value="All";
  $("sectionSelect").onchange=()=>{
    section=$("sectionSelect").value;
    idx=0;
    englishHidden=false;
    applyFilter();
  };
  applyFilter();
  renderTopicTabs();
}

function applyFilter(){
  const data=TOPICS[topicIndex].data;
  filtered=section==="All"?data:data.filter(x=>x.section===section);
  if(idx>=filtered.length)idx=0;
  render();
}

function current(){return filtered[idx];}
function globalKey(){return `t${topicIndex}_${current().en}`;}

function render(){
  const cur=current();
  $("topicTitle").textContent=TOPICS[topicIndex].title;
  $("korean").textContent=cur.ko;
  $("english").textContent=cur.en;
  $("english").classList.toggle("hiddenText",englishHidden);
  $("sectionName").textContent=cur.section;
  $("counter").textContent=`${idx+1} / ${filtered.length}`;
  $("bar").style.width=((idx+1)/filtered.length*100)+"%";
  $("memo").value=localStorage.getItem("memo_"+globalKey())||"";
  $("playBtn").disabled=!audioURLs[globalKey()];
  localStorage.setItem("multi_idx_"+topicIndex,idx);
  $("memo").oninput=()=>localStorage.setItem("memo_"+globalKey(),$("memo").value);
}

function toggleEnglish(){
  englishHidden=!englishHidden;
  render();
}

function speakCurrent(){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(current().en);
  u.lang="en-US";
  u.rate=Number($("rate").value);
  speechSynthesis.speak(u);
}

function repeat3(){
  let n=0;
  function loop(){
    if(n>=3){$("status").textContent="3회 듣기 완료";return;}
    $("status").textContent=`듣는 중 ${n+1}/3`;
    const u=new SpeechSynthesisUtterance(current().en);
    u.lang="en-US";
    u.rate=Number($("rate").value);
    u.onend=()=>{n++;setTimeout(loop,700);}
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }
  loop();
}

async function startRecording(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    recorder=new MediaRecorder(stream);
    chunks=[];
    recorder.ondataavailable=e=>chunks.push(e.data);
    recorder.onstop=()=>{
      const blob=new Blob(chunks,{type:"audio/webm"});
      audioURLs[globalKey()]=URL.createObjectURL(blob);
      $("playBtn").disabled=false;
      $("status").textContent="녹음 완료. 내 목소리를 들어보세요.";
      stream.getTracks().forEach(t=>t.stop());
    };
    recorder.start();
    $("recBtn").disabled=true;
    $("stopBtn").disabled=false;
    $("status").textContent="녹음 중...";
  }catch(e){
    alert("마이크 권한을 허용해 주세요. https:// 주소에서 실행해야 합니다.");
  }
}

function stopRecording(){
  if(recorder&&recorder.state!=="inactive")recorder.stop();
  $("recBtn").disabled=false;
  $("stopBtn").disabled=true;
}

function playRecording(){
  const url=audioURLs[globalKey()];
  if(url)new Audio(url).play();
}

function toggleDone(){
  const key=globalKey();
  done[key]=!done[key];
  localStorage.setItem("multi_done",JSON.stringify(done));
  $("status").textContent=done[key]?"완료 체크됨":"완료 체크 해제";
}

function prevSentence(){
  if(idx>0){idx--;englishHidden=false;render();}
}

function nextSentence(){
  if(idx<filtered.length-1){idx++;englishHidden=false;render();}
}

init();
</script>
</body>
</html>
