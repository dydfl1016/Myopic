<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OPIC Speaking Lab</title>
<style>
body{margin:0;background:#fff7ef;font-family:Arial,sans-serif;color:#231f20}
.app{max-width:760px;margin:auto;padding:18px 15px 95px}
h1{font-size:22px;color:#3d2a20;margin-bottom:6px}
.info{color:#74675f;font-size:14px;line-height:1.5}
.topicTabs{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:12px 0}
.topicTabs button{padding:10px 4px;font-size:13px;border-radius:13px}
.activeTopic{background:#7b4a2f!important;color:white!important}
.card{background:#fffdf9;border:1px solid #ead8c9;border-radius:22px;padding:18px;box-shadow:0 8px 25px #0001}
select,button,textarea{font:inherit}
select{width:100%;padding:13px;border-radius:14px;border:1px solid #ead8c9;margin-bottom:12px}
.korean{font-size:20px;line-height:1.45;font-weight:700;background:#f7eadf;padding:14px;border-radius:16px;margin:14px 0}
.english{font-size:24px;line-height:1.35;font-weight:800;margin:18px 0;padding:16px;border-radius:16px;background:#fff;cursor:pointer;border:1px dashed #d8bfa9}
.hiddenText{color:transparent;text-shadow:0 0 10px #b9a99b;background:#f3e4d6}
.progress{height:10px;background:#eee0d4;border-radius:999px;overflow:hidden}
.bar{height:100%;background:#7b4a2f;width:0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}
button{border:0;border-radius:16px;padding:14px;font-weight:800;background:#efe3d8;color:#3c2a21}
.primary{background:#7b4a2f;color:white}
.green{background:#2f6f55;color:white}
.red{background:#a83d32;color:white}
button:disabled{opacity:.45}
textarea{width:100%;min-height:80px;border:1px solid #ead8c9;border-radius:14px;padding:12px}
.bottom{position:fixed;bottom:0;left:0;right:0;background:#fff7eff0;border-top:1px solid #ead8c9;padding:10px}
.bottom div{max-width:760px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}
</style>
</head>

<body>
<div class="app">
<h1>🎤 OPIC Speaking Lab</h1>
<p class="info">주제를 선택하고, 한국어만 보고 영어로 말해보세요. 영어 문장은 터치하면 숨김/보임이 바뀝니다.</p>

<div class="topicTabs" id="topicTabs"></div>

<select id="sectionSelect"></select>

<div class="card">
  <p class="info"><b id="topicTitle"></b></p>
  <p class="info"><span id="sectionName"></span> · <b id="counter"></b></p>
  <div class="progress"><div class="bar" id="bar"></div></div>

  <div class="korean" id="korean"></div>
  <div class="english" id="english" onclick="toggleEnglish()"></div>
  <p class="info">👆 영어 문장을 터치하면 가려지고, 다시 터치하면 보입니다.</p>

  <div class="grid">
    <button class="primary" onclick="speakCurrent()">🔊 듣기</button>
    <button onclick="repeat3()">🔁 3회 듣기</button>
    <button class="green" id="recBtn" onclick="startRecording()">● 녹음 시작</button>
    <button class="red" id="stopBtn" onclick="stopRecording()" disabled>■ 녹음 중지</button>
    <button id="playBtn" onclick="playRecording()" disabled>▶ 내 목소리</button>
    <button onclick="toggleDone()">✓ 완료 체크</button>
  </div>

  <p id="status" class="info"></p>

  <label class="info">음성 속도</label>
  <input id="rate" type="range" min="0.6" max="1.2" step="0.05" value="0.85" style="width:100%">

  <h3>내 발음 메모</h3>
  <textarea id="memo" placeholder="강세, 끊어 읽기, 어려운 발음 메모"></textarea>
</div>

<p class="info">※ GitHub Pages의 https:// 주소에서 열어야 마이크 녹음이 정상 작동합니다.</p>
</div>

<div class="bottom">
  <div>
    <button onclick="prevSentence()">← 이전</button>
    <button class="primary" onclick="nextSentence()">다음 →</button>
  </div>
</div>

<script>
const TOPICS = [
{
title:"Topic 1: AI & Social Media",
data:[
{section:"Introduction",ko:"솔직히 말해서, 저는 요즘 디지털 크리에이터로서 여러 역할을 동시에 하고 있습니다.",en:"To be honest, I’ve been wearing many hats lately as a digital creator."},
{section:"Introduction",ko:"저는 제 창작물을 위한 인스타그램 계정을 운영하며, 웹툰과 소설부터 짧은 애니메이션까지 다양한 콘텐츠를 공유합니다.",en:"I run an Instagram account dedicated to my creative works, where I share everything from webtoons and novels to short animations."},
{section:"Introduction",ko:"AI 시대에, 창작자를 진정으로 차별화하는 것은 그 사람만의 삶의 이야기와 개인적인 경험이라는 것을 깨달았습니다.",en:"In this era of AI, I’ve realized that what truly sets a creator apart is their unique life story and personal experiences."},
{section:"Introduction",ko:"그래서 저는 제 여정을 기록하기 시작했습니다. 단순한 취미가 아니라 평생의 사명처럼 말입니다.",en:"That’s why I’ve started documenting my journey—not just as a hobby, but as a lifelong mission."},
{section:"Main Body 1",ko:"AI가 계속 발전하고 생성 콘텐츠가 시장에 넘쳐날수록, 인간적인 손길과 진정성의 가치는 더욱 높아질 것이라고 믿습니다.",en:"I strongly believe that as AI continues to evolve and flood the market with generated content, the value of human touch and authenticity will skyrocket."},
{section:"Main Body 1",ko:"누구나 프롬프트로 이미지나 이야기를 만들 수 있지만, 제 과거와 감정, 인생에서 배운 교훈은 아무도 똑같이 복제할 수 없습니다.",en:"Anyone can generate an image or a story with a prompt, but no one can replicate my specific past, my emotions, or the lessons I’ve learned throughout my life."},
{section:"Main Body 1",ko:"제 개인사를 웹툰과 글에 녹여내면서, 저는 저만의 고유한 브랜드를 만들고 있습니다.",en:"By blending my personal history into my webtoons and writing, I’m creating a brand that is uniquely mine, which I think is more important now than ever before."},
{section:"Main Body 2",ko:"흥미로운 점은, 저는 이것을 단기 프로젝트로 보지 않는다는 것입니다.",en:"What’s exciting is that I don’t see this as a short-term project."},
{section:"Main Body 2",ko:"저는 이 창작 활동을 아주 오랫동안 지속하고 싶습니다.",en:"I plan to sustain this creative career for a very long time."},
{section:"Main Body 2",ko:"제 목표는 제 삶의 흔적을 디지털 아카이브로 남기는 것입니다. 말하자면 하나의 유산 같은 것이죠.",en:"My goal is to build a digital archive of my existence—a legacy, if you will."},
{section:"Main Body 2",ko:"2D 애니메이션이든, 소셜 미디어에 연재하는 소설이든, 저는 계속해서 제가 누구인지의 본질을 담아내고 싶습니다.",en:"Whether it’s through a 2D animation or a serialized novel on social media, I want to keep capturing the essence of who I am."},
{section:"Main Body 2",ko:"이러한 지속적인 창작 과정은 저에게 동기를 주고, 빠르게 변하는 세상 속에서 삶의 목적의식을 줍니다.",en:"This process of constant creation keeps me motivated and gives me a sense of purpose in this rapidly changing world."},
{section:"Conclusion",ko:"간단히 말해, 제 소셜 미디어는 단순한 갤러리가 아닙니다. 그것은 제 삶의 살아 있는 기록입니다.",en:"So, in a nutshell, my social media presence isn't just a gallery; it’s a living record of my life."},
{section:"Conclusion",ko:"저는 이야기꾼으로서의 뿌리를 잃지 않으면서 기술과 함께 계속 성장해 나가고 싶습니다.",en:"I’m committed to evolving alongside technology while staying true to my roots as a storyteller."},
{section:"Conclusion",ko:"이 길이 저를 예술가로 성장시킬 뿐만 아니라, 사람들과 더 깊고 인간적인 차원에서 연결되게 해줄 것이라고 확신합니다.",en:"I’m confident that this path will not only help me grow as an artist but also allow me to connect with others on a much deeper, more human level."}
]
},

{
title:"Topic 2: Difficulties in My Job",
data:[
{section:"Question",ko:"질문: 당신의 직업에서 어떤 어려움을 겪나요?",en:"What difficulties do you face in your job?"},
{section:"Opening",ko:"제 직업에서 가장 큰 어려움 중 하나는 제가 동시에 여러 역할을 해야 한다는 점입니다.",en:"One of the biggest challenges in my job is that I wear many hats at the same time."},
{section:"My Job",ko:"저는 집에서 작은 영어 공부방을 운영하고 있습니다. 그래서 저는 단순히 선생님만이 아니라 사업 운영자, 관리자, 때로는 상담자 역할도 해야 합니다.",en:"I run a small English academy from my home, so I'm not only a teacher but also a business owner, administrator, and sometimes even a counselor."},
{section:"Business Challenges",ko:"사업 운영자로서 저는 여러 가지 문제를 다뤄야 합니다.",en:"As a business owner, I have to deal with various issues."},
{section:"Business Challenges",ko:"예를 들어 학생들이 갑자기 그만두기도 하고, 일정이 갑자기 바뀌기도 하며, 때로는 학부모님들과 소통하며 걱정이나 오해를 조정해야 할 때도 있습니다.",en:"For example, students occasionally leave the academy, schedules change unexpectedly, and sometimes I need to communicate with parents to resolve concerns or misunderstandings."},
{section:"Mental Management",ko:"혼자 일하기 때문에 제 멘탈 관리도 잘해야 합니다.",en:"Since I work alone, I also have to take good care of my mental health."},
{section:"Professional Growth",ko:"제 공부방의 성과는 거의 제 개인적인 노력에 달려 있기 때문에, 저는 계속 공부하고 수업 방식을 개선하며 새로운 학습 자료를 개발해야 합니다.",en:"The success of my academy depends largely on my own effort, so I constantly need to study, improve my teaching methods, and develop new learning materials."},
{section:"Hardest Part",ko:"하지만 제 직업에서 가장 어려운 부분은 사실 영어를 가르치는 것이 아닙니다.",en:"However, the most difficult part of my job is not teaching English."},
{section:"Student Counseling",ko:"때때로 학생들이 가정 문제, 정체성에 관한 고민, 친구 관계의 갈등, 또는 감정적인 어려움 같은 개인적인 문제를 저에게 털어놓을 때가 있습니다.",en:"Sometimes students come to me with personal problems, such as family issues, identity-related concerns, friendship conflicts, or emotional struggles."},
{section:"Pressure",ko:"그럴 때 저는 솔직히 큰 부담을 느낍니다. 제 말이 학생에게 영향을 줄 수 있다는 것을 알기 때문입니다.",en:"When that happens, I honestly feel a lot of pressure because I know that my words can have an impact on them."},
{section:"Boundaries",ko:"저는 학생들을 도와주고 싶지만, 동시에 그들의 개인적인 삶이나 가정사에 너무 깊이 개입하지 않으려고 노력합니다.",en:"I want to support my students, but at the same time, I try not to interfere too much in their personal lives or family matters."},
{section:"Core Message",ko:"학생을 지지해 주는 것과 적절한 선을 지키는 것 사이에서 균형을 찾는 일이 아마 제 직업에서 가장 어려운 부분일 것입니다.",en:"Finding the right balance between being supportive and respecting boundaries is probably the hardest part of my job."},
{section:"Conclusion",ko:"이런 어려움에도 불구하고, 저는 이러한 경험들이 저를 더 신중한 선생님이자 더 이해심 있는 사람으로 만들어 주었다고 믿습니다.",en:"Despite these challenges, I believe they have helped me become a more thoughtful teacher and a more understanding person."}
]
},

{
title:"Topic 3: Memorable Movie-Watching Experience",
data:[
{section:"Question",ko:"질문: 기억에 남는 영화 관람 경험을 묘사해 주세요.",en:"Describe a memorable movie-watching experience."},

{section:"Opening",ko:"제가 지금까지 했던 영화 관람 경험 중 가장 기억에 남는 것은 봉준호 감독의 『살인의 추억』을 봤을 때입니다.",en:"One of the most memorable movie-watching experiences I've ever had was when I watched Memories of Murder, directed by Bong Joon-ho."},

{section:"Reason",ko:"이 경험이 그렇게 기억에 남는 이유는 그 영화가 남편과 첫 번째 데이트에서 함께 본 영화였기 때문입니다.",en:"What makes this experience so memorable is that it was the first movie I watched with my husband on our very first date."},

{section:"Honest Comment",ko:"솔직히 말해서, 데이트 영화로는 그렇게 낭만적인 선택은 아니었습니다. 왜냐하면 그 영화는 범죄 스릴러였기 때문입니다.",en:"To be honest, it wasn't exactly the most romantic choice for a date because it's a crime thriller."},

{section:"Popularity",ko:"하지만 그 당시에는 그 영화가 극장에서 가장 인기 있는 영화였습니다.",en:"However, it was the most popular movie at the time."},

{section:"Memory",ko:"제 기억으로는 그 영화의 매표소 줄이 가장 길었던 것 같습니다.",en:"As far as I can remember, it had the longest line at the ticket booth."},

{section:"Old Theater Experience",ko:"우리는 표를 사고 영화관에 들어가기 위해 꽤 오랫동안 줄을 서야 했습니다.",en:"We had to wait in line for quite a while just to buy tickets and get into the theater."},

{section:"Old Theater Experience",ko:"그때는 사람들이 보통 직접 표를 사고, 극장에 들어가기 전에도 긴 줄을 서곤 했습니다.",en:"Back then, people usually bought tickets in person and stood in long lines before entering the cinema."},

{section:"Vivid Memory",ko:"많은 시간이 지났지만, 저는 아직도 그날을 생생하게 기억합니다.",en:"Even though it has been many years, I still vividly remember that day."},

{section:"Vivid Memory",ko:"저는 극장의 분위기, 관객들의 들뜬 느낌, 그리고 몇몇 긴장감 넘치는 장면에서 나왔던 관객들의 반응을 기억합니다.",en:"I remember the atmosphere of the theater, the excitement in the crowd, and the audience's reactions during some of the most intense scenes."},

{section:"Core Feeling",ko:"영화 자체보다도, 저는 그날의 느낌을 더 기억하는 것 같습니다.",en:"More than the movie itself, I think I remember the feeling of that day."},

{section:"Conclusion",ko:"남편과의 첫 데이트였기 때문에, 그 모든 경험이 지금까지도 제 마음에 남아 있는 특별한 기억이 되었습니다.",en:"Since it was my first date with my husband, the entire experience became a special memory that has stayed with me ever since."}
]
},

{
title:"Topic 4: Thoughts on Frankenstein",
data:[
{section:"Opening",ko:"프랑켄슈타인에 대해 더 알아보면서 정말 놀랐던 점은, 이 작품이 제가 생각했던 그런 이야기가 아니었다는 것입니다.",en:"One thing that really surprised me while learning more about Frankenstein was that it wasn't the story I thought it was."},

{section:"Old Impression",ko:"오랫동안 저는 프랑켄슈타인이 괴물을 만든 과학자에 대한 공상과학 이야기라고만 생각했습니다.",en:"For a long time, I simply thought Frankenstein was a science fiction story about a scientist who creates a monster."},

{section:"Old Impression",ko:"또한 이 작품이 주로 인간의 오만함과 신처럼 행동하려는 욕망에 대한 경고라고 생각했습니다.",en:"I also thought it was mainly a warning about human arrogance and the desire to play God."},

{section:"New Perspective",ko:"하지만 최근 이 소설에 대한 토론을 보고 메리 셸리에 대해 더 알게 되면서, 저는 완전히 다른 관점에서 이 작품을 보게 되었습니다.",en:"However, after watching a recent discussion about the novel and learning more about Mary Shelley, I began to see it from a completely different perspective."},

{section:"Mary Shelley",ko:"더 놀라웠던 것은 이 소설이 1818년에 한 젊은 여성에 의해 쓰였다는 점이었습니다.",en:"What surprised me even more was that the novel was written in 1818 by a young woman."},

{section:"Mary Shelley",ko:"그 시대에 쓰인 작품이라는 점을 생각하면, 이 작품의 주제는 놀라울 정도로 현대적으로 느껴집니다.",en:"Considering when it was written, the themes feel incredibly modern."},

{section:"Responsibility",ko:"제 마음에 오래 남았던 해석은 프랑켄슈타인이 단지 창조에 대한 이야기가 아니라 책임에 대한 이야기이기도 하다는 점이었습니다.",en:"One interpretation that really stayed with me was the idea that Frankenstein is not only about creation, but also about responsibility."},

{section:"Victor",ko:"빅터 프랑켄슈타인은 무언가 비범한 것을 이루는 데 집착합니다.",en:"Victor Frankenstein is obsessed with achieving something extraordinary."},

{section:"Victor",ko:"그는 인간의 한계를 넘어서 생명 그 자체를 창조하고 싶어 합니다.",en:"He wants to push beyond human limits and create life itself."},

{section:"Victor",ko:"하지만 성공하자마자, 그는 자신이 창조한 존재를 버립니다.",en:"But once he succeeds, he abandons the very thing he created."},

{section:"Ambition",ko:"그런 관점에서 보면, 이 소설은 야망이 책임보다 더 중요해질 때 어떤 일이 벌어지는지에 대한 이야기로 읽을 수 있습니다.",en:"From that perspective, the novel can be read as a story about what happens when ambition becomes more important than responsibility."},

{section:"Family Responsibility",ko:"그 토론에서는 이것을 사람들이 거대한 꿈을 좇으면서도 삶 속의 평범하지만 의미 있는 책임을 소홀히 하는 모습에 비유했습니다.",en:"The discussion compared it to people pursuing grand dreams while neglecting the ordinary but meaningful responsibilities in their lives."},

{section:"Family Responsibility",ko:"예를 들면 가족을 돌보고, 아이를 키우고, 자신을 필요로 하는 사람들 곁에 있어 주는 일 같은 것들입니다.",en:"These include taking care of family, raising children, and being present for the people who depend on them."},

{section:"Personal Reaction",ko:"저는 그 해석이 매우 강렬하게 다가왔습니다. 그 해석 덕분에 이 이야기가 훨씬 더 인간적이고 현재에도 관련 있는 이야기처럼 느껴졌기 때문입니다.",en:"I found that interpretation very powerful because it made the story feel much more human and relevant."},

{section:"People in the Past",ko:"또 하나 인상 깊었던 점은 과거의 사람들이 얼마나 깊은 통찰력을 가질 수 있었는가 하는 것이었습니다.",en:"Another thing that struck me was how insightful people from the past could be."},

{section:"Assumption",ko:"저는 예전에는 현대인들이 200년 전 사람들보다 당연히 더 똑똑하다고 생각했습니다.",en:"I used to assume that modern people are naturally smarter than people who lived two hundred years ago."},

{section:"Assumption",ko:"왜냐하면 우리는 더 나은 기술과 더 많은 정보, 그리고 이전 세대가 갖지 못했던 지식에 접근할 수 있기 때문입니다.",en:"That is because we have better technology, more information, and access to knowledge that previous generations never had."},

{section:"Changed Thought",ko:"하지만 프랑켄슈타인 같은 작품을 읽으면 그런 생각에 의문을 갖게 됩니다.",en:"But reading works like Frankenstein makes me question that assumption."},

{section:"Human Nature",ko:"기술은 엄청나게 발전했지만, 인간의 본성은 그만큼 크게 변하지 않았습니다.",en:"Technology has advanced dramatically, but human nature hasn't changed nearly as much."},

{section:"Human Nature",ko:"과거의 사람들도 오늘날 우리처럼 야망, 외로움, 책임, 사랑, 두려움, 정체성과 씨름했습니다.",en:"People in the past struggled with ambition, loneliness, responsibility, love, fear, and identity just as we do today."},

{section:"Insight",ko:"어떤 면에서 메리 셸리 같은 작가들은 오늘날의 기준으로 보아도 놀라울 만큼 통찰력이 뛰어납니다.",en:"In some ways, writers like Mary Shelley seem remarkably insightful, even by today's standards."},

{section:"Wisdom",ko:"이 작품은 기술의 발전이 곧 지혜의 발전을 의미하지는 않는다는 점을 떠올리게 했습니다.",en:"It reminded me that progress in technology does not automatically mean progress in wisdom."},

{section:"Conclusion",ko:"때로는 200년 전의 사람이 현대에 사는 많은 사람들보다 인간 본성을 더 분명하게 볼 수 있습니다.",en:"Sometimes a person from two hundred years ago can see something about human nature more clearly than many people living in the modern world."},

{section:"Conclusion",ko:"그것이 제가 프랑켄슈타인을 읽고 생각하면서 얻은 가장 기억에 남는 깨달음이었습니다.",en:"That was probably the most memorable takeaway for me from reading and thinking about Frankenstein."}
]
},
  
{
title:"Topic 5: AI and Education Policy",
data:[
{section:"Opening",ko:"제 생각을 나눌 기회를 주셔서 감사합니다.",en:"Thank you for giving me the opportunity to share my thoughts."},

{section:"Background",ko:"저는 교육 분야에서 일해 왔고, 몇 년 동안 초등학생들에게 영어를 가르쳐 왔습니다.",en:"I come from an educational background, and for several years I have been teaching English to elementary school students."},

{section:"Initial Concern",ko:"생성형 AI가 처음 등장했을 때, 저는 솔직히 걱정이 되었습니다.",en:"When generative AI first appeared, I was honestly worried."},

{section:"Initial Concern",ko:"많은 교육자들처럼, 저는 AI가 교사를 대체하고 일자리를 없애며 교육 산업을 완전히 바꿀 것이라는 예측을 들었습니다.",en:"Like many educators, I heard predictions that AI would replace teachers, eliminate jobs, and completely transform the education industry."},

{section:"Changed Perspective",ko:"하지만 실제로 AI를 사용해 보면서 제 관점은 바뀌었습니다.",en:"However, after spending time actually using AI, my perspective changed."},

{section:"Changed Perspective",ko:"AI는 제 일을 대체하기보다 제가 할 수 있는 일을 확장해 주었습니다.",en:"Instead of replacing my work, AI expanded what I was able to do."},

{section:"Examples",ko:"예를 들어, 저는 AI를 활용해 맞춤형 학습 자료를 만들고, 말하기 활동을 개발하고, AI 보조 코딩을 통해 간단한 교육용 앱까지 만들어 보았습니다.",en:"For example, I have used AI to create customized learning materials, develop speaking activities, and even build simple educational applications through AI-assisted coding."},

{section:"Examples",ko:"이런 것들은 몇 년 전만 해도 제가 혼자 할 수 있으리라고 상상하지 못했던 일들입니다.",en:"These are things I could not have imagined doing by myself a few years ago."},

{section:"Realization",ko:"저를 가장 놀라게 한 것은 기술 그 자체가 아니었습니다.",en:"What surprised me most was not the technology itself."},

{section:"Realization",ko:"소프트웨어 공학 배경이 없는 평범한 교육자들도 갑자기 창작자가 될 수 있다는 사실이었습니다.",en:"It was the fact that ordinary educators with no software engineering background could suddenly become creators."},

{section:"New Opportunities",ko:"저는 우리가 AI가 일부 업무를 없애는 동시에 완전히 새로운 기회를 만들어 내는 시기에 들어서고 있다고 믿습니다.",en:"I believe we are entering a period where AI will eliminate some tasks, but at the same time create entirely new opportunities."},

{section:"Government Training",ko:"최근 저는 정부 지원 AI 교육 프로그램들을 살펴보았습니다.",en:"Recently, I explored government-supported AI training programs."},

{section:"Government Training",ko:"저에게 인상 깊었던 것은 아주 짧은 기간 안에 새로 생긴 강좌가 정말 많다는 점이었습니다.",en:"What impressed me was the sheer number of new courses that have appeared within a very short period of time."},

{section:"Government Training",ko:"몇 년 전만 해도 이런 프로그램들 중 많은 것은 존재하지도 않았습니다.",en:"A few years ago, many of these programs did not even exist."},

{section:"Government Training",ko:"이제는 AI 리터러시, AI 보조 코딩, 콘텐츠 제작, 자동화, 교육 기술과 관련된 강좌들을 볼 수 있습니다.",en:"Now we see courses related to AI literacy, AI-assisted coding, content creation, automation, and educational technology."},

{section:"Emerging Roles",ko:"제게 이것은 새로운 역할과 새로운 산업이 많은 사람들이 예상했던 것보다 더 빠르게 생겨나고 있다는 증거처럼 보입니다.",en:"To me, this is evidence that new roles and new industries are emerging faster than many people expected."},

{section:"Teacher and AI",ko:"교육의 관점에서 저는 미래가 교사와 AI의 경쟁이라고 생각하지 않습니다.",en:"From an educational perspective, I do not believe the future is a competition between teachers and AI."},

{section:"Teacher and AI",ko:"저는 미래가 AI와 함께 일할 줄 아는 교사들의 것이라고 믿습니다.",en:"I believe the future belongs to teachers who know how to work with AI."},

{section:"Human Guidance",ko:"학생들은 여전히 인간의 지도가 필요합니다.",en:"Students still need human guidance."},

{section:"Human Guidance",ko:"학생들에게는 여전히 동기 부여, 정서적 지지, 창의성, 비판적 사고가 필요합니다.",en:"They still need motivation, emotional support, creativity, and critical thinking."},

{section:"Human Guidance",ko:"AI는 정보를 제공할 수 있지만, 교육 안에 존재하는 인간관계를 완전히 대체할 수는 없습니다.",en:"AI can provide information, but it cannot fully replace the human relationship that exists in education."},

{section:"Policy Goal",ko:"그렇기 때문에 저는 공공 정책의 중요한 목표 중 하나가 교육자들이 AI를 두려워하기보다 AI에 적응하도록 돕는 것이어야 한다고 생각합니다.",en:"Because of this, I think one of the most important goals of public policy should be helping educators adapt to AI rather than fear it."},

{section:"Mid-career Professionals",ko:"제가 강조하고 싶은 또 다른 점은 중장년층과 경력직 전문가들에게도 기회가 있다는 것입니다.",en:"Another point I would like to emphasize is the opportunity for mid-career professionals and older workers."},

{section:"Mid-career Professionals",ko:"많은 사람들은 AI가 젊은 엔지니어나 기술 전문가들만을 위한 것이라고 생각합니다.",en:"Many people assume that AI is only for young engineers or technology specialists."},

{section:"Mid-career Professionals",ko:"저는 그렇게 생각하지 않습니다.",en:"I disagree."},

{section:"Domain Expertise",ko:"오히려 가장 가치 있는 기여 중 일부는 교육, 의료, 행정, 비즈니스 분야에서 이미 수십 년의 경험을 가진 사람들에게서 나올 수 있습니다.",en:"In fact, some of the most valuable contributions may come from people who already have decades of experience in education, healthcare, administration, or business."},

{section:"Domain Expertise",ko:"AI는 현장 전문성과 결합될 때 훨씬 더 강력해집니다.",en:"AI becomes much more powerful when it is combined with domain expertise."},

{section:"Access",ko:"문제는 나이가 아닙니다.",en:"The challenge is not age."},

{section:"Access",ko:"문제는 학습 기회와 실용적인 훈련에 대한 접근성입니다.",en:"The challenge is access to learning opportunities and practical training."},

{section:"Recommendation",ko:"제가 한 가지 제안을 한다면, 그것은 이것입니다.",en:"If I could make one recommendation, it would be this:"},

{section:"Recommendation",ko:"우리는 AI를 기술 과목으로 가르치는 데만 집중하기보다, 사람들이 AI로 현실의 문제를 해결하도록 돕는 데 더 집중해야 합니다.",en:"We should focus less on teaching AI as a technical subject and more on helping people solve real-world problems with AI."},

{section:"Practical Value",ko:"사람들이 자신의 일에서 즉각적인 가치를 발견할 때, AI를 받아들이는 일은 훨씬 쉬워집니다.",en:"When people see immediate value in their own work, adoption becomes much easier."},

{section:"Personal Experience",ko:"제 경험에서도 바로 그런 일이 일어났습니다.",en:"That is exactly what happened in my own experience."},

{section:"Personal Experience",ko:"저는 영어 교사로 시작했습니다.",en:"I started as an English teacher."},

{section:"Personal Experience",ko:"오늘날 저는 AI 기반 교육 도구도 만들고 있습니다.",en:"Today, I am also creating AI-powered educational tools."},

{section:"Conclusion",ko:"그리고 저는 다른 많은 사람들도 비슷한 전환을 할 수 있다고 믿습니다.",en:"And I believe many others can make a similar transition."},

{section:"Closing",ko:"감사합니다.",en:"Thank you."}
]
},


{
title:"Topic 6: TED-Ed Slow Loris",
data:[

{section:"Introduction",ko:"동남아시아의 정글 깊숙한 곳에는 치명적인 생물이 숨어 있습니다.",en:"Deep in the jungles of Southeast Asia lurks a deadly creature."},

{section:"Introduction",ko:"그 생물은 날카로운 이빨과 독이 있는 물기를 가지고 있습니다.",en:"It has sharp teeth and a venomous bite."},

{section:"Introduction",ko:"그 생물은 슬로 로리스입니다.",en:"It is a slow loris."},

{section:"Introduction",ko:"커다란 눈 때문에 귀엽게 보이지만, 그들의 이야기는 훨씬 더 강렬합니다.",en:"Despite their wide-eyed looks, their story is much fiercer than you might imagine."},

{section:"Evolution",ko:"로리스는 약 7천만 년 전에 다른 영장류와 갈라졌습니다.",en:"Lorises split off from other primates as far back as 70 million years ago."},

{section:"Evolution",ko:"그 당시에는 티라노사우루스가 아직 지구를 돌아다니고 있었습니다.",en:"At that time, T-Rexes still roamed the Earth."},

{section:"Evolution",ko:"그들은 점차 아프리카에서 아시아로 이동했습니다.",en:"They gradually migrated from Africa to Asia."},

{section:"Behavior",ko:"매일 해 질 무렵이 되면 로리스는 활동을 시작합니다.",en:"Around sunset each evening, lorises get active."},

{section:"Behavior",ko:"그들은 천천히 그리고 신중하게 나무 사이를 이동합니다.",en:"They move slowly and deliberately through the trees."},

{section:"Behavior",ko:"그들은 큰 눈으로 다음 먹이를 찾습니다.",en:"They use their large eyes to scan for their next meal."},

{section:"Behavior",ko:"그리고 쉬는 시간은 거의 없습니다.",en:"They take little time to rest."},

{section:"Behavior",ko:"피그미 로리스는 밤새 거의 계속 움직입니다.",en:"Pygmy lorises regularly spend their nights in near-constant motion."},

{section:"Muscles",ko:"하지만 슬로 로리스는 다른 영장류와 다릅니다.",en:"However, slow lorises are different from many other primates."},

{section:"Muscles",ko:"그들은 느린 근육 섬유를 더 많이 가지고 있습니다.",en:"They have a higher proportion of slow-twitch muscle fibers."},

{section:"Muscles",ko:"이 근육은 빠른 움직임보다 오래 버티는 데 적합합니다.",en:"These muscles are favored for long-winded exertion rather than speedy spurts."},

{section:"Muscles",ko:"그들은 또한 더 많은 척추뼈를 가지고 있습니다.",en:"They also have extra vertebrae."},

{section:"Muscles",ko:"그래서 필요할 때 매우 유연하게 움직일 수 있습니다.",en:"This makes them especially flexible when needed."},

{section:"Stealth",ko:"슬로 로리스는 한 나뭇가지에 몇 시간 동안 매달려 있을 수 있습니다.",en:"Slow lorises can stay gripped to one tree branch for hours."},

{section:"Stealth",ko:"그들의 혈관 구조는 팔다리가 저리거나 약해지는 것을 막아줍니다.",en:"Their blood vessel networks prevent their limbs from becoming weak or numb."},

{section:"Stealth",ko:"느린 움직임은 그들을 눈에 띄지 않게 해 줍니다.",en:"Their slow movements help them go undetected."},

{section:"Stealth",ko:"그 덕분에 포식자를 피할 수 있습니다.",en:"That helps them avoid threats from predators."},

{section:"Diet",ko:"슬로 로리스는 잡식성 동물입니다.",en:"Slow lorises are omnivores."},

{section:"Diet",ko:"그들은 곤충과 작은 동물을 먹습니다.",en:"They eat insects and other small animals."},

{section:"Diet",ko:"또한 과일과 꽃꿀도 먹습니다.",en:"They also consume fruit and nectar."},

{section:"Diet",ko:"흥미롭게도 나무의 수액과 껌도 많이 먹습니다.",en:"Interestingly, they also consume a lot of tree gum and sap."},

{section:"Diet",ko:"그들은 특수한 이빨로 나무껍질을 긁습니다.",en:"They scratch tree bark with specialized teeth."},

{section:"Venom",ko:"과학자들은 슬로 로리스가 독성을 가진 동물이라고 생각합니다.",en:"Scientists believe slow lorises are toxic animals."},

{section:"Venom",ko:"그들은 유일한 독성 영장류입니다.",en:"They are the only venomous primates."},

{section:"Venom",ko:"또한 독이 있는 몇 안 되는 포유류 중 하나입니다.",en:"They are also one of only a few venomous mammals."},

{section:"Venom",ko:"그들의 독 시스템은 매우 복잡한 것으로 알려져 있습니다.",en:"Their venom system is thought to be extremely complex."},

{section:"Defense",ko:"위협을 받으면 로리스는 독 자세를 취합니다.",en:"When threatened, slow lorises assume their venom pose."},

{section:"Defense",ko:"그들은 팔을 들어 겨드랑이 근처의 분비선에 접근합니다.",en:"They raise their arms to access glands near their armpits."},

{section:"Defense",ko:"이 분비선은 독성 기름을 분비합니다.",en:"These glands secrete a toxic oil."},

{section:"Defense",ko:"그 기름은 침과 섞여 강력한 독이 됩니다.",en:"The oil combines with saliva to form a powerful venom."},

{section:"Defense",ko:"그들은 이 독을 이빨에 저장합니다.",en:"They store the venom on their teeth."},

{section:"Defense",ko:"그 물기는 심한 통증과 조직 손상을 일으킬 수 있습니다.",en:"Their bite can cause intense pain and tissue damage."},

{section:"Defense",ko:"작은 동물에게는 치명적일 수도 있습니다.",en:"It can even be fatal to small animals."},

{section:"Predators",ko:"슬로 로리스는 몸에 독성 기름을 바릅니다.",en:"Slow lorises spread the oil over their coats."},

{section:"Predators",ko:"이것은 기생충을 죽이는 데 도움이 됩니다.",en:"This helps kill parasites."},

{section:"Predators",ko:"또한 더 큰 위협으로부터 보호해 줄 수도 있습니다.",en:"It may also protect them from larger threats."},

{section:"Predators",ko:"고양이와 사향고양이는 그들의 냄새를 싫어합니다.",en:"Cats and civets are repelled by their scent."},

{section:"Predators",ko:"하지만 오랑우탄은 예외일 수도 있습니다.",en:"Orangutans seem to have found a way around it."},

{section:"Conflict",ko:"슬로 로리스의 가장 흔한 피해자는 사실 다른 슬로 로리스입니다.",en:"The most common victims of slow loris bites are other slow lorises."},

{section:"Conflict",ko:"과학자들은 개체군의 20퍼센트가 다른 로리스에게 물린 것을 발견했습니다.",en:"Scientists found that twenty percent of one population had been bitten by other lorises."},

{section:"Conflict",ko:"아마도 제한된 영역을 둘러싼 싸움 때문일 것입니다.",en:"This may be due to fights over limited territory."},

{section:"Mimicry",ko:"슬로 로리스는 위험할 때 몸을 흔들고 거친 소리를 냅니다.",en:"When in danger, slow lorises sway and make a raspy noise."},

{section:"Mimicry",ko:"과학자들은 그들이 코브라를 흉내 낼 수 있다고 생각합니다.",en:"Some scientists think they may mimic cobras."},

{section:"Mimicry",ko:"이는 뮐러식 의태의 한 예일 수 있습니다.",en:"This could be an example of Müllerian mimicry."},

{section:"Mimicry",ko:"위험한 종들이 비슷한 특징을 공유하는 현상입니다.",en:"It is a phenomenon in which dangerous species share warning characteristics."},

{section:"Human Threat",ko:"하지만 인간은 그 신호를 제대로 이해하지 못하는 것 같습니다.",en:"Humans do not seem to be getting the message."},

{section:"Human Threat",ko:"모든 슬로 로리스 종은 위협받고 있습니다.",en:"Every species of slow loris is threatened."},

{section:"Human Threat",ko:"그럼에도 불구하고 사람들은 그들을 불법적으로 반려동물로 거래합니다.",en:"Nevertheless, people continue to trade them illegally as pets."},

{section:"Human Threat",ko:"그들의 이빨은 잘리거나 뽑히기도 합니다.",en:"Their teeth are often cut or pulled."},

{section:"Conclusion",ko:"이제는 그들이 보내는 신호를 이해해야 할 때입니다.",en:"It is time for us to understand the signals they have been sending."},

{section:"Conclusion",ko:"그리고 슬로 로리스와 그들의 숲을 그대로 두어야 합니다.",en:"And we should leave the fierce slow loris and its forests alone."}

]
},

let topicIndex=Number(localStorage.getItem("topicIndex")||0);
let idx=Number(localStorage.getItem("multi_idx_"+topicIndex)||0);
let section="All";
let filtered=[];
let englishHidden=false;
let recorder,chunks=[],audioURLs={};
let done=JSON.parse(localStorage.getItem("multi_done")||"{}");

const $=id=>document.getElementById(id);

function init(){
  renderTopicTabs();
  loadTopic();
}

function renderTopicTabs(){
  $("topicTabs").innerHTML=TOPICS.map((t,i)=>
    `<button onclick="changeTopic(${i})" class="${i===topicIndex?'activeTopic':''}">주제 ${i+1}</button>`
  ).join("");
}

function changeTopic(i){
  topicIndex=i;
  localStorage.setItem("topicIndex",topicIndex);
  idx=Number(localStorage.getItem("multi_idx_"+topicIndex)||0);
  section="All";
  englishHidden=false;
  speechSynthesis.cancel();
  loadTopic();
}

function loadTopic(){
  const data=TOPICS[topicIndex].data;
  const sections=["All",...new Set(data.map(x=>x.section))];
  $("sectionSelect").innerHTML=sections.map(s=>`<option>${s}</option>`).join("");
  $("sectionSelect").value="All";
  $("sectionSelect").onchange=()=>{
    section=$("sectionSelect").value;
    idx=0;
    englishHidden=false;
    applyFilter();
  };
  applyFilter();
  renderTopicTabs();
}

function applyFilter(){
  const data=TOPICS[topicIndex].data;
  filtered=section==="All"?data:data.filter(x=>x.section===section);
  if(idx>=filtered.length)idx=0;
  render();
}

function current(){return filtered[idx];}
function globalKey(){return `t${topicIndex}_${current().en}`;}

function render(){
  const cur=current();
  $("topicTitle").textContent=TOPICS[topicIndex].title;
  $("korean").textContent=cur.ko;
  $("english").textContent=cur.en;
  $("english").classList.toggle("hiddenText",englishHidden);
  $("sectionName").textContent=cur.section;
  $("counter").textContent=`${idx+1} / ${filtered.length}`;
  $("bar").style.width=((idx+1)/filtered.length*100)+"%";
  $("memo").value=localStorage.getItem("memo_"+globalKey())||"";
  $("playBtn").disabled=!audioURLs[globalKey()];
  localStorage.setItem("multi_idx_"+topicIndex,idx);
  $("memo").oninput=()=>localStorage.setItem("memo_"+globalKey(),$("memo").value);
}

function toggleEnglish(){
  englishHidden=!englishHidden;
  render();
}

function speakCurrent(){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(current().en);
  u.lang="en-US";
  u.rate=Number($("rate").value);
  speechSynthesis.speak(u);
}

function repeat3(){
  let n=0;
  function loop(){
    if(n>=3){$("status").textContent="3회 듣기 완료";return;}
    $("status").textContent=`듣는 중 ${n+1}/3`;
    const u=new SpeechSynthesisUtterance(current().en);
    u.lang="en-US";
    u.rate=Number($("rate").value);
    u.onend=()=>{n++;setTimeout(loop,700);}
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }
  loop();
}

async function startRecording(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    recorder=new MediaRecorder(stream);
    chunks=[];
    recorder.ondataavailable=e=>chunks.push(e.data);
    recorder.onstop=()=>{
      const blob=new Blob(chunks,{type:"audio/webm"});
      audioURLs[globalKey()]=URL.createObjectURL(blob);
      $("playBtn").disabled=false;
      $("status").textContent="녹음 완료. 내 목소리를 들어보세요.";
      stream.getTracks().forEach(t=>t.stop());
    };
    recorder.start();
    $("recBtn").disabled=true;
    $("stopBtn").disabled=false;
    $("status").textContent="녹음 중...";
  }catch(e){
    alert("마이크 권한을 허용해 주세요. https:// 주소에서 실행해야 합니다.");
  }
}

function stopRecording(){
  if(recorder&&recorder.state!=="inactive")recorder.stop();
  $("recBtn").disabled=false;
  $("stopBtn").disabled=true;
}

function playRecording(){
  const url=audioURLs[globalKey()];
  if(url)new Audio(url).play();
}

function toggleDone(){
  const key=globalKey();
  done[key]=!done[key];
  localStorage.setItem("multi_done",JSON.stringify(done));
  $("status").textContent=done[key]?"완료 체크됨":"완료 체크 해제";
}

function prevSentence(){
  if(idx>0){idx--;englishHidden=false;render();}
}

function nextSentence(){
  if(idx<filtered.length-1){idx++;englishHidden=false;render();}
}

init();
</script>
</body>
</html>
